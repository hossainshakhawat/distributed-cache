# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Go

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25.0'

    - name: Build
      run: |
        for dir in cache-client cache-node router invalidation-service example-app; do
          echo "=== building $dir ===" && (cd $dir && go build -v ./...)
        done

    - name: Test
      run: |
        for dir in cache-client cache-node router invalidation-service example-app; do
          echo "=== testing $dir ===" && (cd $dir && go test -v ./...)
        done
